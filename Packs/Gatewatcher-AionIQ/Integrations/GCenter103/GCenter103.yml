category: Network Security
sectionOrder:
- Connect
- Collect
commonfields:
  id: GCenter 103
  version: -1
configuration:
- display: GCenter IP address
  name: ip
  required: true
  type: 0
  section: Connect
  additionalinfo: The IP of the GCenter from where the events will be fetched.
- displaypassword: GCenter API token
  name: token
  required: false
  hiddenusername: true
  type: 9
  additionalinfo: You must provide either an API token or a username and a password.
  section: Connect
- display: GCenter Version
  name: version
  required: false
  type: 0
  defaultvalue: 2.5.3.103
  section: Connect
- display: GCenter username
  displaypassword: GCenter password
  name: credentials
  required: false
  type: 9
  section: Connect
- display: Check the TLS certificate
  name: check_cert
  required: false
  type: 8
  section: Collect
- display: Use system proxy settings
  name: proxy
  type: 8
  required: false
- display: Fetch incidents
  name: isFetch
  type: 8
  required: false
- name: fetch_type
  display: Fetch incidents from type
  defaultvalue: Alerts
  type: 15
  options:
  - Alerts
  - Metadata
  - Both
  required: false
- name: engine_selection
  display: Engine alerts selection
  type: 16
  options:
  - malcore
  - shellcode_detect
  - malicious_powershell_detect
  - sigflow_alert
  - dga_detect
  - active_cti
  - retrohunt
  - ransomware_detect
  - beacon_detect  
  required: false
- defaultValue: 1 day
  display: First fetch
  name: first_fetch
  type: 0
  additionalinfo: This value represents how far the first fetch will grab the events stored in the GCenter e.g. 2 days
  section: Collect
  required: false
- defaultValue: 200
  display: Fetch limit
  name: max_fetch
  type: 0
  additionalinfo: This value represents the maximum events fetched by instruction. The default value is 200 and is the optimum for Cortex XSOAR.
  section: Collect
  required: false
description: This integration fetch events generated by the GCenter appliance.
display: GCenter 103
name: GCenter 103
script:
  runonce: false
  script: '-'
  type: python
  subtype: python3
  dockerimage: demisto/python3:3.10.14.91134
  isfetch: true
  commands:
  - name: gcenter103-alerts-list
    description: List all alerts
    deprecated: false
    outputs:
    - contextPath: test
      description: test
      type: String
  - name: gcenter103-alerts-get
    description: Get an alert by UUID
    deprecated: false
    outputs:
    - contextPath: test
      description: test
      type: String
  - name: gcenter103-alerts-note-update
    description: Update an alert note by UUID
    deprecated: false
    outputs:
    - contextPath: test
      description: test
      type: String
  - name: gcenter103-alerts-tags-get
    description: Get tags of an alert by UUID
    deprecated: false
    outputs:
    - contextPath: test
      description: test
      type: String
  - name: gcenter103-alerts-tags-update
    description: Update tags of an alert by UUID
    deprecated: false
    outputs:
    - contextPath: test
      description: test
      type: String
  - name: gcenter103-alerts-status-update
    description: Update status of an alert
    deprecated: false
    outputs:
    - contextPath: test
      description: test
      type: String
  - name: gcenter103-raw-alerts-get
    description: Get a raw alert by id
    deprecated: false
    outputs:
    - contextPath: test
      description: test
      type: String
  - name: gcenter103-raw-alerts-file-get
    description: Get a file attached to an alert with its id
    deprecated: false
    outputs:
    - contextPath: test
      description: test
      type: String
  - name: gcenter103-file-scan
    description: Scan a file on a selected engine 
    deprecated: false
    outputs:
    - contextPath: test
      description: test
      type: String
  - name: gcenter103-file-scan-result-get
    description: Retrieve previous scan with its id
    deprecated: false
    outputs:
    - contextPath: test
      description: test
      type: String
  - name: gcenter103-assets-list
    description: List assets
    deprecated: false
    outputs:
    - contextPath: test
      description: test
      type: String
  - name: gcenter103-assets-alerts-get
    description: Retrieve alerts of a given asset
    deprecated: false
    outputs:
    - contextPath: test
      description: test
      type: String
  - arguments:
    - description: Asset name
      name: asset_name
    name: gcenter103-assets-get
    description: Retrieve specific asset data
    deprecated: false
    outputs:
    - contextPath: test
      description: test
      type: String
  - arguments:
    - description: Asset name
      name: asset_name
    - description: Note to update
      name: note
    name: gcenter103-assets-note-update
    description: Update an asset note
    deprecated: false
    outputs:
    - contextPath: Gatewatcher.Assets.Note.Update
      description: The updated note
      type: string
  - arguments:
    - description: Asset name
      name: asset_name
    name: gcenter103-assets-tags-get
    description: Get the tags of an asset
    deprecated: false
    outputs:
    - contextPath: Gatewatcher.Assets.Tags.Get
      description: The tags of the asset
      type: string
  - arguments:
    - description: Asset name
      name: asset_name
      required: true
    - description: Tags
      name: tags
      isArray: true
      required: true
    name: gcenter103-assets-tags-update
    description: Update the tags of an asset
    deprecated: false
    outputs:
    - contextPath: Gatewatcher.Assets.Tags.Update
      description: The updated tags of the asset
      type: string
  - arguments:
    - description: A search term
      name: search
    - description: A page to select in the results set 
      name: page
    - description: Number of results per page
      name: page_size
    - description: ISO-8601 date format 
      name: date_from
    - description: ISO-8601 date format 
      name: date_to
    - description: 15d, yesterday, ... | Not compatible with date_from and date_to parameters 
      name: since
    - description: true/false  
      name: fast
    - description: List of GCap IDs, first GCap has ID 1
      name: gcap_id
    - description: Possible values are risk, -risk, name, -name
      name: sort_by
    - description: Minimal risk value
      name: risk_min
    - description: Maximal risk value
      name: risk_max
    - description: Username filter
      name: username
      isArray: true
    - description: IPs addresses
      name: ip
      isArray: true
    - description: Hostnames
      name: hostname
      isArray: true
    - description: User tags
      name: tag
      isArray: true
    - description: User note content
      name: note
    - description: true/false, true means users with no tags
      name: no_tag 
    name: gcenter103-users-list
    description: Retrieves a list of Kerberos users
    deprecated: false
    outputs:
    - contextPath: Gatewatcher.Users.List
      description: The list of Kerberos users
      type: string
  - arguments:
    - description: ISO-8601 date format 
      name: date_from
    - description: ISO-8601 date format 
      name: date_to
    - description: 15d, yesterday, ... | Not compatible with date_from and date_to parameters 
      name: since
    - description: List of alerts IDs
      name: ids
    - description: List of alerts IDs
      name: excluded_ids
    - description: true/false, filter on acknowledgement status
      name: acknowledged
    - description: List of GCap IDs, first GCap has ID 1
      name: gcap_id
    - description: IPs addresses related of alerts
      name: ip
      isArray: true
    - description: Source IPs addresses of alerts
      name: src_ip
      isArray: true
    - description: Destination IPs addresses of alerts
      name: dest_ip
      isArray: true
    - description: Minimal risk value
      name: risk_min
    - description: Maximal risk value
      name: risk_max
    - description: Filter alerts on their signature
      name: name
    - description: Filter alerts on their description
      name: description
    - description: User tags
      name: tag
      isArray: true
    - description: true/false, true means users with no tags
      name: no_tag 
    - description: Exclude alerts with a list of tags (logical OR between the tags)
      name: excluded_tags 
    - description: Possible values are date, -date, risk, -risk, name, -name
      name: sort_by
    - description: Filter alerts on engines, possible values are active_cti, beacon_detect, dga_detect, malcore, malcore_retroanalyzer, malicious_powershell_detect, ransomware_detect, retrohunt, shellcode_detect, sigflow_alert
      name: type
    - description: Filter alert by MITRE tactic name, possible values are Collection, Collection (ICS), Collection (Mobile), Command and Control, Command and Control (ICS), Command and Control (Mobile), Credential Access, Credential Access (Mobile), Defense Evasion, Defense Evasion (Mobile), Discovery, Discovery (ICS), Discovery (Mobile), Evasion, Execution, Execution (ICS), Execution (Mobile), Exfiltration, Exfiltration (Mobile), Impact, Impact (ICS), Impact (Mobile), Impair Process Control, Inhibit Response Function, Initial Access, Initial Access (ICS), Initial Access (Mobile), Lateral Movement, Lateral Movement (ICS), Lateral Movement (Mobile), Persistence, Persistence (ICS), Persistence (Mobile), Privilege Escalation, Privilege Escalation (ICS), Privilege Escalation (Mobile), Reconnaissance, Resource Development
      name: mitre_tactic_name
    - description: Hostnames
      name: hostname
      isArray: true
    - description: Source hostnames
      name: src_hostname
      isArray: true
    - description: Destination hostnames
      name: dest_hostname
      isArray: true
    - description: Username filter
      name: username
      isArray: true
    - description: User note content
      name: note
    - description: Filter alerts on their state, possible values are closed, mute, open
      name: state
    - description: A page to select in the results set 
      name: page
    - description: Number of results per page
      name: page_size
    - description: Alerts of this Kerberos user name   
      name: kuser_name
      required: true
    name: gcenter103-users-alerts-get
    description: Retrieves a list of the alerts of a Kerberos user
    deprecated: false
    outputs:
    - contextPath: Gatewatcher.Users.Alerts.Get
      description: The list of alerts of a Kerberos user
      type: string
fromversion: 6.5.0
defaultclassifier: Gatewatcher Incidents Classifier
