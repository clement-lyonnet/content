    - description: List of alerts IDs
      name: ids
    - description: List of alerts IDs
      name: excluded_ids
    - description: true/false, filter on acknowledgement status
      name: acknowledged
    - description: List of GCap IDs, first GCap has ID 1
      name: gcap_id
    - description: IPs addresses related of alerts
      name: ip
